title: jQuery Validation Plugin
description: Site content for the jQuery Validation Plugin
url: https://jquery-validation.github.io
baseurl: "/validation-content"

# Build settings
markdown: kramdown

# Exclude from processing
exclude:
  - node_modules
  - config.json
  - README.md
  - LICENSE-MIT.txt
  - .gitignore
  - .gitattributes
  - dist
  - Gemfile
  - Gemfile.lock
  - GITHUB_PAGES_SETUP.md
  - CONVERSION_NOTES.md

# Collections
collections:
  entries:
    output: true
    permalink: /:name/

defaults:
  - scope:
      path: ""
      type: "entries"
    values:
      layout: "default"
