title: jQuery Validation Plugin
description: Site content for the jQuery Validation Plugin
url: https://jquery-validation.github.io
baseurl: "/validation-content"

# Build settings
markdown: kramdown

# Exclude from processing
exclude:
  - Gruntfile.js
  - package.json
  - package-lock.json
  - node_modules
  - config.json
  - config-sample.json
  - entries2html.xsl
  - notes.xsl
  - README.md
  - LICENSE-MIT.txt
  - .gitignore
  - .gitattributes
  - dist
  - Gemfile
  - Gemfile.lock
  - GITHUB_PAGES_SETUP.md

# Collections
collections:
  entries:
    output: true
    permalink: /:collection/:name/

defaults:
  - scope:
      path: ""
      type: "entries"
    values:
      layout: "default"
